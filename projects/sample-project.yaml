project_name: sample-project
project_path: PLACEHOLDER_PROJECT_PATH

read_first:
  - README.md
  - docs/COMMAND_CENTER_BLUEPRINT.md
  - docs/FILE_OWNERSHIP_RULES.md
  - docs/FORBIDDEN_ACTIONS.md

test_commands:
  - .\scripts\doctor.ps1
  - .\scripts\validate-tasks.ps1

smoke_commands:
  - .\scripts\status.ps1

forbidden_changes:
  - .env
  - "**/.env"
  - "**/*secret*"
  - "**/*key*"
  - external production systems
  - destructive filesystem commands
  - unmanaged credential storage

autonomy_level: 0
max_worker_retries: 1
max_parallel_workers: 2
lock_expiry_minutes: 60
