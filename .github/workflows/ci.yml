name: CI

# Automated test gate on every push / PR, on a GitHub-hosted runner (no secrets, no VM).
# deploy.yml is the manual, on-VM deploy; THIS is the check that the unit suite is green
# before code is promoted toward master/production. Pair it with branch protection
# (require the `test` check) so a red suite can't reach the 24/7 box.

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Dummy LLM key so any client construction during tests is hermetic (no real calls).
      OPENROUTER_API_KEY: ci-dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run test suite
        run: python -m pytest -q -p no:cacheprovider
