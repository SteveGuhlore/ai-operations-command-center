#   - local_outreach_pod  -> Easy Simple Sites (easysimplesites.org)
#   - market_research_pod -> Tony Stocks (newsletter brand TBD)

shop_name: Easy Simple Sites
platform: easysimplesites.org
audience: local Massachusetts businesses without websites
tagline: "Professional websites for local businesses, starting at $199, live in 24 hours."
tone: friendly, direct, no fluff — small-business owner talking to small-business owner
price_range: "$199–$799"
format: Static HTML/CSS site (Starter / Pro / Premium)
works_with: "any local business — restaurants, salons, auto shops, etc."

product_formula:
  - a tight use case (email writing, content calendar, job search, etc.)
  - 30–150 prompts depending on the pack
  - instructions for getting the best output on the first try
  - priced $6–$14 based on prompt count and specificity

seo_keywords:
  - chatgpt prompts
  - ai prompts
  - prompt pack
  - chatgpt tips
  - claude prompts
  - ai productivity
  - chatgpt for [niche]
  - prompt template
  - instant download
  - digital download

do_not:
  - use jargon like "leverage synergies" or "unlock your potential"
  - make claims about income or results guarantees
  - promise specific AI outputs (AI varies by user)
  - use more than 13 Etsy tags per listing
