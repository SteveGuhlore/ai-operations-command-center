    const templateEl = document.querySelector('script[type="__bundler/template"]');

    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {

        if (entry.compressed) {

            const reader = ds.readable.getReader();

            writer.close();

              chunks.push(value);

            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to

    const doc = new DOMParser().parseFromString(template, 'text/html');

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

    // which fired before we swapped the document. Trigger manually if present.

      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

orm:translate(-50%,-50%);left:{{ ddPeakPt.left }};top:{{ ddPeakPt.top }}\"><\u002Fdiv>\n              <div style=\"position:absolute;pointer-events:none;width:8px;height:8px;border-radius:50%;background:#ff5d73;border:2px solid #0a0c0b;transform:translate(-50%,-50%);left:{{ ddTroughPt.left }};top:{{ ddTroughPt.top }}\"><\u002Fdiv>\n              <div style=\"position:absolute;pointer-events:none;transform:translate(9px,-50%);left:{{ ddTroughPt.left }};top:{{ ddTroughPt.top }};font-size:10px;letter-spacing:.02em;color:#ff5d73;white-space:nowrap;background:#0a0c0b;padding:1px 4px;border-radius:3px\">max drawdown {{ ddPct }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ hasActive }}\">\n              <div style=\"position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.22);pointer-events:none;left:{{ activeLeft }}\"><\u002Fdiv>\n              <sc-for list=\"{{ activeDots }}\" as=\"d\" hint-placeholder-count=\"3\">\n                <div style=\"position:absolute;width:9px;height:9px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;border:2px solid #0a0c0b;left:{{ d.left }};top:{{ d.top }};background:{{ d.color }};box-shadow:0 0 8px {{ d.color }}\"><\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"position:absolute;top:6px;pointer-events:none;background:#0f1311;border:1px solid rgba(255,255,255,.14);border-radius:4px;padding:8px 10px;font-size:11px;white-space:nowrap;transform:translateX(-50%);z-index:5;box-shadow:0 6px 20px rgba(0,0,0,.5);left:{{ activeLeft }}\">\n                <div style=\"color:#eaf2e9;font-weight:700;margin-bottom:5px\">{{ tip.date }} <span style=\"color:#7d887f;font-weight:400\">· {{ tip.when }}<\u002Fspan><\u002Fdiv>\n                <div style=\"color:#ff9e2c;margin-bottom:2px\">Tony {{ tip.tonyV }} <span style=\"color:#7d887f\">{{ tip.tonyP }}<\u002Fspan><\u002Fdiv>\n                <div style=\"color:#37e0ff;margin-bottom:2px\">Bot {{ tip.botV }} <span style=\"color:#7d887f\">{{ tip.botP }}<\u002Fspan><\u002Fdiv>\n                <div style=\"color:#929e95\">S&amp;P 500 {{ tip.spxV }} <span style=\"color:#7d887f\">{{ tip.spxP }}<\u002Fspan><\u002Fdiv>\n                <sc-if value=\"{{ pinned }}\"><div style=\"color:#7d887f;margin-top:5px;font-size:10.5px;letter-spacing:.1em\">PINNED · CLICK TO RELEASE<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex\">\n          <div style=\"width:54px;flex-shrink:0\"><\u002Fdiv>\n          <div style=\"position:relative;flex:1;height:14px;margin-top:5px\">\n            <sc-for list=\"{{ xTicks }}\" as=\"xt\" hint-placeholder-count=\"5\">\n              <div style=\"position:absolute;left:{{ xt.left }};transform:translateX(-50%);font-size:10.5px;color:#7d887f;white-space:nowrap\">{{ xt.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:16px;font-size:12px;margin-top:12px;flex-wrap:wrap;align-items:center\">\n          <span style=\"color:#ff9e2c\">■ Tony {{ tonyEnd }}<\u002Fspan><span style=\"color:#37e0ff\">■ Bot {{ botEnd }}<\u002Fspan><span style=\"color:{{ spxLegendCol }}\">■ S&amp;P 500 {{ spxLegendText }}<\u002Fspan><span style=\"color:#7d887f;margin-left:auto;letter-spacing:.04em\">hover · pin<\u002Fspan>\n        <\u002Fdiv>\n        <div ref=\"{{ feedRef }}\" style=\"margin-top:10px;font-size:10.5px;letter-spacing:.02em;color:#7d887f\"><span style=\"display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff9e2c;margin-right:6px;vertical-align:middle\"><\u002Fspan>connecting benchmark feed…<\u002Fdiv>\n        <details style=\"margin-top:9px\">\n          <summary style=\"cursor:pointer;font-size:10.5px;color:#929e95;letter-spacing:.04em;list-style:none\">ⓘ how to read this chart<\u002Fsummary>\n          <div style=\"margin-top:7px;font-size:10.5px;color:#7d887f;letter-spacing:.02em;line-height:1.6\">Indexed to a common <b style=\"color:#929e95;font-weight:700\">$1M start<\u002Fb> so Tony ($1M), the bot ($100k book) and the S&amp;P 500 compare on equal footing — the gap between the lines is the edge. The <span style=\"color:#ff5d73\">red marker<\u002Fspan> shows the <b style=\"color:#929e95;font-weight:700\">max drawdown<\u002Fb>: the worst peak (●) to low (<span style=\"color:#ff5d73\">●<\u002Fspan>) dip before recovery. When the SPY line is <b style=\"color:#929e95;font-weight:700\">dashed<\u002Fb>, the benchmark is simulated and waiting on a live feed — it is not a real SPY move.<\u002Fdiv>\n        <\u002Fdetails><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#0a0c0b;padding:18px 18px 20px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;color:#929e95;letter-spacing:.16em;font-size:10.5px;text-transform:uppercase;margin-bottom:14px\">\n          <span>Does the 2nd pass help?<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,.08)\">\n          <div style=\"background:#0f1311;padding:13px 12px\">\n            <div style=\"font-size:26px;font-weight:700;line-height:1;color:#46d39a\">10<\u002Fdiv>\n            <div style=\"margin-top:5px;font-size:10px;color:#929e95;letter-spacing:.04em\">agreed · right<\u002Fdiv>\n            <div style=\"margin-top:3px;font-size:10.5px;color:#7d887f;line-height:1.3\">kept the bot's call — it worked<\u002Fdiv>\n            <div style=\"height:3px;margin-top:9px;background:rgba(255,255,255,.06);overflow:hidden\"><i data-w=\"42%\" style=\"display:block;height:100%;width:0;background:#46d39a;transition:width 1.1s 1s ease\"><\u002Fi><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#0f1311;padding:13px 12px\">\n            <div style=\"font-size:26px;font-weight:700;line-height:1;color:#ff5d73\">9<\u002Fdiv>\n            <div style=\"margin-top:5px;font-size:10px;color:#929e95;letter-spacing:.04em\">agreed · wrong<\u002Fdiv>\n            <div style=\"margin-top:3px;font-size:10.5px;color:#7d887f;line-height:1.3\">kept the bot's call — it lost<\u002Fdiv>\n            <div style=\"height:3px;margin-top:9px;background:rgba(255,255,255,.06);overflow:hidden\"><i data-w=\"38%\" style=\"display:block;height:100%;width:0;background:#ff5d73;transition:width 1.1s 1s ease\"><\u002Fi><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#0f1311;padding:13px 12px\">\n            <div style=\"font-size:26px;font-weight:700;line-height:1;color:#ff9e2c\">24<\u002Fdiv>\n            <div style=\"margin-top:5px;font-size:10px;color:#929e95;letter-spacing:.04em\">tony saved<\u002Fdiv>\n            <div style=\"margin-top:3px;font-size:10.5px;color:#7d887f;line-height:1.3\">overrode / cut — dodged a loss<\u002Fdiv>\n            <div style=\"height:3px;margin-top:9px;background:rgba(255,255,255,.06);overflow:hidden\"><i data-w=\"96%\" style=\"display:block;height:100%;width:0;background:#ff9e2c;transition:width 1.1s 1s ease\"><\u002Fi><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#0f1311;padding:13px 12px\">\n            <div style=\"font-size:26px;font-weight:700;line-height:1;color:#929e95\">25<\u002Fdiv>\n            <div style=\"margin-top:5px;font-size:10px;color:#929e95;letter-spacing:.04em\">tony missed<\u002Fdiv>\n            <div style=\"margin-top:3px;font-size:10.5px;color:#7d887f;line-height:1.3\">overrode / cut — gave up a gain<\u002Fdiv>\n            <div style=\"height:3px;margin-top:9px;background:rgba(255,255,255,.06);overflow:hidden\"><i data-w=\"100%\" style=\"display:block;height:100%;width:0;background:#7e8a82;transition:width 1.1s 1s ease\"><\u002Fi><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;margin-top:11px;font-size:11px;color:#929e95\"><span>NET 34 good / 34 bad<\u002Fspan><span>even · small n<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:12px;padding-top:11px;border-top:1px solid rgba(255,255,255,.06)\">\n          <div style=\"font-size:10.5px;letter-spacing:.04em;color:#7d887f;line-height:1.5;margin-bottom:11px\">\n            <span style=\"color:#46d39a\">good<\u002Fspan> = tony saved + agreed-right · <span style=\"color:#ff5d73\">bad<\u002Fspan> = tony missed + agreed-wrong\n          <\u002Fdiv>\n          <div style=\"font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#929e95;margin-bottom:8px\">Calibration · win-rate by Tony's confidence<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px\">\n            <div><div style=\"font-size:20px;font-weight:700;color:#ff5d73;line-height:1\">44%<\u002Fdiv><div style=\"font-size:10.5px;color:#929e95;margin-top:3px\">low conf<\u002Fdiv><div style=\"font-size:10.5px;color:#7d887f\">n 18<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:20px;font-weight:700;color:#ffce4a;line-height:1\">51%<\u002Fdiv><div style=\"font-size:10.5px;color:#929e95;margin-top:3px\">med conf<\u002Fdiv><div style=\"font-size:10.5px;color:#7d887f\">n 27<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:20px;font-weight:700;color:#46d39a;line-height:1\">63%<\u002Fdiv><div style=\"font-size:10.5px;color:#929e95;margin-top:3px\">high conf<\u002Fdiv><div style=\"font-size:10.5px;color:#7d887f\">n 23<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:10.5px;color:#7d887f;margin-top:8px;line-height:1.5\">when Tony is more sure, the calls should win more often — that climb (44 → 51 → 63) is the signal worth watching<\u002Fdiv>\n          <div style=\"margin-top:13px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px\">\n              <span style=\"font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#929e95\">Override hit-rate<\u002Fspan>\n              <span style=\"font-size:19px;font-weight:700;color:#ff9e2c\">49%<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;display:flex\">\n              <div style=\"height:100%;background:#46d39a;width:49%\"><\u002Fdiv>\n              <div style=\"height:100%;background:#ff5d73;width:51%\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:10.5px;color:#7d887f;margin-top:7px;line-height:1.55\">when Tony overrides the bot — <span style=\"color:#46d39a\">24 saved<\u002Fspan> vs <span style=\"color:#ff5d73\">25 missed<\u002Fspan> (n 49). This is the whole bet: is the 2nd pass beating the scanner's raw call? Right now it's a coin flip on small n — honest, not yet an edge.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <\u002Fsc-if><\u002Fdiv>\n    \n\n    <sc-if value=\"{{ viewCalls }}\">\n    <div>\n    <div class=\"t-grid\" style=\"display:grid;grid-template-columns:1.55fr 1fr;gap:1px;background:rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.08)\">\n      <div style=\"background:#0a0c0b;padding:18px 18px 20px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;color:#929e95;letter-spacing:.16em;font-size:10.5px;text-transform:uppercase;margin-bottom:13px;gap:10px;flex-wrap:wrap\">\n          <span>Tony · calls<\u002Fspan>\n          <span style=\"display:flex;gap:5px;align-items:center\">\n            <span style=\"color:#7d887f;font-size:10.5px;letter-spacing:.16em\">LAYOUT<\u002Fspan>\n            <sc-for list=\"{{ variants }}\" as=\"v\" hint-placeholder-count=\"3\">\n              <span data-variant=\"{{ v.key }}\" onclick=\"{{ onVariantClick }}\" style=\"cursor:pointer;font-size:10.5px;letter-spacing:.06em;padding:4px 8px;border-radius:3px;border:1px solid {{ v.col }};color:{{ v.col }};background:{{ v.bg }}\">{{ v.label }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)\">\n          <div style=\"display:flex;align-items:center;gap:8px;color:#37e0ff;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px\">\n            <span>Bot queue · awaiting 2nd pass<\u002Fspan><span style=\"color:#7d887f\">· {{ pending.length }}<\u002Fspan><span style=\"flex:1;height:1px;background:rgba(55,224,255,.15)\"><\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ pending }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <div style=\"display:grid;grid-template-columns:54px 1fr auto;gap:10px;align-items:baseline;padding:6px 0;font-size:12px\">\n              <span style=\"font-weight:700;color:#eaf2e9\">{{ p.sym }}<\u002Fspan>\n              <span style=\"color:#929e95;font-size:11.5px\">bot {{ p.score }} · {{ p.sig }}<\u002Fspan>\n              <span style=\"color:#ff9e2c;font-size:10px;letter-spacing:.06em;white-space:nowrap\">○ {{ p.time }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"max-height:460px;overflow-y:auto;padding-right:10px;margin-right:-4px\">\n        <sc-if value=\"{{ isChips }}\">\n          <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px\">\n            <sc-for list=\"{{ chips }}\" as=\"ch\" hint-placeholder-count=\"5\">\n              <span data-key=\"{{ ch.key }}\" onclick=\"{{ onChipClick }}\" style=\"cursor:pointer;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;padding:5px 9px;border-radius:3px;border:1px solid {{ ch.col }};color:{{ ch.col }};background:{{ ch.bg }}\">{{ ch.label }} · {{ ch.count }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isFlat }}\">\n          <div style=\"display:flex;gap:10px;align-it urn Object.assign({}, c, { col:this.verbColor(c.verb) }); }, this);\n    // spark geometry (viewBox 240 x 80; data fills left ~188, target/projection on right)\n    const v = t.vals, n = v.length;\n    const lv = v.slice();\n    if (t.entryLvl != null) lv.push(t.entryLvl);\n    if (t.stopLvl != null) lv.push(t.stopLvl);\n    if (t.targetLvl != null) lv.push(t.targetLvl);\n    const mn = Math.min.apply(null, lv), mx = Math.max.apply(null, lv);\n    const pad = (mx - mn) * 0.14 || 1;\n    const lo = mn - pad, hi = mx + pad;\n    const H = 80, PW = 184;\n    const X = function(i){ return 4 + i/(n-1)*PW; };\n    const Y = function(val){ return 8 + (hi - val)/(hi - lo)*(H-18); };\n    t.sparkPts = v.map(function(val,i){ return X(i)+','+Y(val); }).join(' ');\n    let a = 'M '+X(0)+' '+Y(v[0]);\n    v.forEach(function(val,i){ a += ' L '+X(i)+' '+Y(val); });\n    a += ' L '+X(n-1)+' '+H+' L '+X(0)+' '+H+' Z';\n    t.sparkArea = a;\n    t.hasLevels = (t.entryLvl != null && t.stopLvl != null);\n    t.entryY = t.entryLvl != null ? Y(t.entryLvl) : 0;\n    t.stopY = t.stopLvl != null ? Y(t.stopLvl) : 0;\n    t.lastX = X(n-1);\n    t.lastY = Y(v[n-1]);\n    t.sparkN = n;\n    t.sparkCoords = v.map(function(val,i){ return { left:(X(i)/240*100)+'%', top:(Y(val)/H*100)+'%' }; });\n    t.entryTopPct = t.entryLvl != null ? (Y(t.entryLvl)/H*100)+'%' : '0%';\n    t.stopTopPct = t.stopLvl != null ? (Y(t.stopLvl)/H*100)+'%' : '0%';\n    t.hasTarget = t.targetLvl != null;\n    t.targetY = t.hasTarget ? Y(t.targetLvl) : 0;\n    t.targetTopPct = t.hasTarget ? (Y(t.targetLvl)/H*100)+'%' : '0%';\n    t.target = t.hasTarget ? (Math.round(t.targetLvl*100)/100).toFixed(2) : '';\n    t.projX1 = t.lastX; t.projY1 = t.lastY; t.projX2 = 236; t.projY2 = t.hasTarget ? Y(t.targetLvl) : t.lastY;\n    t.futureW = 240 - t.lastX;\n    t.targetCol = (t.hasTarget && t.targetLvl < v[n-1]) ? '#ff5d73' : '#46d39a';\n    const dec = mx < 10 ? 2 : mx < 100 ? 1 : 0;\n    t.priceTicks = [mx, (mx+mn)/2, mn].map(function(val){ return { label:'$'+(Math.round(val*100)/100).toFixed(dec), top:(Y(val)/H*100)+'%' }; });\n    const dts = this.sparkDates; const di = [0, Math.round((n-1)/2), n-1];\n    t.dateTicks = di.map(function(i){ return { label:dts[i], left:(X(i)/240*100)+'%' }; });\n    if (t.hasTarget){ const lp = parseFloat(String(t.last).replace(/,/g,'')); const gap = (t.targetLvl/lp - 1)*100; t.targetGap = (gap >= 0 ? '+' : '') + gap.toFixed(1) + '% to target'; t.targetGapCol = gap >= 0 ? '#46d39a' : '#ff5d73'; } else { t.targetGap = ''; t.targetGapCol = '#7e8a82'; }\n  }\n\n  componentDidMount(){\n    this.buildTape(); this.countUp(); this.growBars(); this.applyTweaks();\n    this.tickClock(); this._clock = setInterval(()=>this.tickClock(), 1000);\n    this.loadCachedSPX();\n    this.initFeed();\n    this._feed = setInterval(()=>this.initFeed(), 60000);\n    this._liveFeed = setInterval(()=>this._hydrateLive(), 60000);\n    this._statics = setInterval(()=>this._patchStatics(), 5000);\n  }\n  componentWillUnmount(){ clearInterval(this._clock); clearInterval(this._feed); }\n  componentDidUpdate(){ this.applyTweaks(); }\n\n  // ---------- live terminal clock (ET) ----------\n  tickClock(){\n    const el = this.clockRef.current;\n    if (!el) return;\n    const now = new Date();\n    const parts = new Intl.DateTimeFormat('en-US', { timeZone:'America/New_York', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, weekday:'short' }).formatToParts(now);\n    const get = (t)=> (parts.find(p=>p.type===t)||{}).value;\n    const hh = get('hour'), mm = get('minute'), ss = get('second'), wd = get('weekday');\n    const mins = (+hh)*60 + (+mm);\n    const weekday = ['Mon','Tue','Wed','Thu','Fri'].indexOf(wd) >= 0;\n    const open = weekday && mins >= 570 && mins < 960;\n    const stateLabel = open ? 'OPEN' : 'CLOSED';\n    const stateCol = open ? '#46d39a' : '#ff5d73';\n    const src = this.state.spxLive ? ('LIVE · SPY via ' + this.state.spxSrc) : 'SIM · simulated feed';\n    const srcCol = this.state.spxLive ? '#c4f042' : '#ff9e2c';\n    const dotAnim = open ? 'animation:pulse 2s infinite' : '';\n    el.innerHTML =\n      '<span style=\"width:7px;height:7px;border-radius:50%;background:'+stateCol+';box-shadow:0 0 10px '+stateCol+';'+dotAnim+'\"><\u002Fspan>' +\n      '<span style=\"color:'+srcCol+'\">'+src+'<\u002Fspan>' +\n      '<span style=\"color:#7d887f\">·<\u002Fspan><span style=\"color:'+stateCol+'\">MKT '+stateLabel+'<\u002Fspan>' +\n      '<span style=\"color:#7d887f\">·<\u002Fspan><span style=\"color:#eaf2e9\">'+hh+':'+mm+'<span style=\"color:#7d887f\">:'+ss+'<\u002Fspan> ET<\u002Fspan>';\n  }\n\n  // ---------- live SPY benchmark feed ----------\n  \n  async _hydrateLive(){\n    try {\n      const res = await fetch('/api/tony/live');\n      if (!res.ok) return;\n      const json = await res.json();\n      if (!json || json.status === 'error') return;\n      // Per-section hydration: each block below gates on its OWN data, so record-derived\n      // numbers can go live even if (say) the Alpaca marks feed is momentarily down.\n\n      // book\n      if (json.book && json.book.length) {\n        this.book = json.book.map(function(b){\n          return { sym:b.sym, qty:String(b.qty), entry:String(b.entry), last:String(b.last), unreal:String(b.unreal), up:!!b.up };\n        });\n      }\n\n      // calls\n      if (json.calls && json.calls.length) {\n        this.calls = json.calls.map(function(c){\n          return { sym:c.sym, verb:c.verb, note:c.note, time:c.time, day:c.day, grade:c.grade };\n        });\n      }\n\n      // stash full live payload for Priority C reads\n      this.live = json;\n\n      // projections\n      if (json.projections) {\n        const self = this;\n        Object.keys(json.projections).forEach(function(sym){\n          if (!self.tickers[sym]) return;\n          const proj = json.projections[sym];\n          self.tickers[sym].projection = proj;\n          if (proj.target != null) self.tickers[sym].targetLvl = proj.target;\n          self.tickers[sym].horizon = (function(hd){\n            if (!hd || hd.length < 2 || hd[0] == null || hd[1] == null) return '\u2014';\n            return hd[0] + '\u2013' + hd[1] + 'd';\n          })(proj.horizonDays);\n          self.enrich(self.tickers[sym]);\n        });\n      }\n\n      // equity chart \u2014 rebuild 2wk range when live data is present\n      if (json.equity && json.equity.labels && json.equity.labels.length &&\n          json.equity.tony && json.equity.tony.length &&\n          json.equity.bot && json.equity.bot.length) {\n        this.charts['2wk'] = this.buildChart(\n          json.equity.labels,\n          json.equity.tony,\n          json.equity.bot,\n          json.equity.bot,\n          '2 wks'\n        );\n      }\n\n      this.forceUpdate();\n      setTimeout(()=>{ try{ this._patchStatics(); }catch(e){} }, 50);\n    } catch(e) {\n      // swallow \u2014 SIM data stays intact\n    }\n  }\n\n  _patchStatics(){\n    // Post-render DOM patch for the masthead aggregates + the \"Does the 2nd pass help?\"\n    // quadrant, which the design artifact renders as static HTML (no template-literal seam).\n    // Only override SIM when we genuinely have graded outcomes (status 'scored'); otherwise\n    // leave the illustrative SIM numbers rather than wipe the panel to misleading zeros.\n    try {\n      const L = this.live;\n      if (!L || L.status !== 'scored') return;\n      const setByLabel = (label, value, fmt) => {\n        if (value == null) return;\n        const nodes = document.querySelectorAll('div');\n        for (let i=0;i<nodes.length;i++){\n          const t = nodes[i].textContent;\n          if (t && t.trim() === label){\n            const n = nodes[i].previousElementSibling;\n            if (n) n.textContent = fmt ? fmt(value) : String(value);\n            return;\n          }\n        }\n      };\n      const q = L.quadrant || {};\n      setByLabel('agreed \u00b7 right', q.agreed_right);\n      setByLabel('agreed \u00b7 wrong', q.agreed_wrong);\n      setByLabel('tony saved', q.tony_saved);\n      setByLabel('tony missed', q.tony_missed);\n      const s = L.stats || {};\n      setByLabel('Call accuracy', s.call_accuracy_pct, v => Math.round(v<=1 ? v*100 : v) + '%');\n      setByLabel('Graded calls', s.graded);\n      setByLabel('Open positions', s.open_positions);\n    } catch(e) {\n      // swallow \u2014 leave SIM values in place\n    }\n  }\n\n  async initFeed(){\n    this.updateMarks();\n    if (!this.state.spxLive) this.updateFeedHealth(null, null, false);\n    try {\n      const res = await this.fetchSPX();\n      if (res && res.closes && res.closes.length >= 3){\n        this.cacheSPX(res);\n        this.applyLiveSPX(res.closes);\n        const last = res.closes[res.closes.length-1];\n        const prev = res.closes[res.closes.length-2];\n        const chg = (last/prev - 1)*100;\n        this.setState({ spxLive:true, spxSrc:res.src, spxQuote:{ last:last.toFixed(2), chg:(chg>=0?'+':'')+chg.toFixed(2)+'%', up:chg>=0 } });\n        this.refreshTape();\n        this.updateFeedHealth(Date.now(), res.src, true);\n      } else {\n        this.updateFeedHealth(this._spxTs || null, this.state.spxSrc, this.state.spxLive);\n      }\n    } catch (e) {\n      // never revert to base — keep whatever real data we last had\n      this.updateFeedHealth(this._spxTs || null, this.state.spxSrc, this.state.spxLive);\n    }\n  }\n\n  loadCachedSPX(){\n    try {\n      const raw = localStorage.getItem('tony_spx');\n      if (!raw) return;\n      const c = JSON.parse(raw);\n      if (c && c.closes && c.closes.length >= 3){\n        this.applyLiveSPX(c.closes);\n        const last = c.closes[c.closes.length-1], prev = c.closes[c.closes.length-2];\n        const chg = (last/prev - 1)*100;\n        this._spxTs = c.ts;\n        this.setState({ spxLive:true, spxSrc:c.src, spxQuote:{ last:last.toFixed(2), chg:(chg>=0?'+':'')+chg.toFixed(2)+'%', up:chg>=0 } });\n        this.refreshTape();\n        this.updateFeedHealth(c.ts, c.src, true);\n      }\n    } catch (e) {}\n  }\n\n  cacheSPX(res){\n    this._spxTs = Date.now();\n    try { localStorage.setItem('tony_spx', JSON.stringify({ closes:res.closes, src:res.src, ts:this._spxTs })); } catch (e) {}\n  }\n\n  updateFeedHealth(ts, src, live){\n    const el = this.feedRef.current;\n    if (!el) return;\n    if (!live || !ts){\n      el.innerHTML = '<span style=\"display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff9e2c;margin-right:6px;vertical-align:middle\"><\u002Fspan><span style=\"color:#ff9e2c\">SIM<\u002Fspan><span style=\"color:#7d887f\"> · benchmark simulated — add Alpaca keys for live SPY<\u002Fspan>';\n      return;\n    }\n    const t = new Date(ts);\n    const hhmm = new Intl.DateTimeFormat('en-US', { timeZone:'America/New_York', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false }).format(t);\n    const fresh = (Date.now() - ts) < 120000;\n    const dot = fresh ? '#46d39a' : '#7d887f';\n    const basis = this.marketOpen() ? 'intraday' : 'last close';\n    el.innerHTML = '<span style=\"display:inline-block;width:6px;height:6px;border-radius:50%;background:'+dot+';box-shadow:0 0 6px '+dot+';margin-right:6px;vertical-align:middle\"><\u002Fspan><span style=\"color:#929e95\">SPY via '+src+' · '+basis+' · updated '+hhmm+' ET<\u002Fspan>';\n  }\n\n  marketOpen(){\n    const parts = new Intl.DateTimeFormat('en-US', { timeZone:'America/New_York', hour:'2-digit', minute:'2-digit', hour12:false, weekday:'short' }).formatToParts(new Date());\n    const g = (t)=> (parts.find(p=>p.type===t)||{}).value;\n    const mins = (+g('hour'))*60 + (+g('minute'));\n    const weekday = ['Mon','Tue','Wed','Thu','Fri'].indexOf(g('weekday')) >= 0;\n    return weekday && mins >= 570 && mins < 960;\n  }\n\n  async fetchSPX(){\n    const cfg = (typeof window !== 'undefined' && window.TONY_FEED) || {};\n    // 1) Alpaca market data (the production path — uses the same broker as the paper book)\n    if (cfg.alpacaKey && cfg.alpacaSecret){\n      const end = new Date().toISOString();\n      const start = new Date(Date.now() - 24*864e5).toISOString();\n      const url = 'https://data.alpaca.markets/v2/stocks/SPY/bars?timeframe=1Day&limit=15&adjustment=all&feed=iex&start='+start+'&end='+end;\n      const r = await fetch(url, { headers:{ 'APCA-API-KEY-ID':cfg.alpacaKey, 'APCA-API-SECRET-KEY':cfg.alpacaSecret } });\n      if (r.ok){ const j = await r.json(); if (j.bars && j.bars.length) return { src:'Alpaca', closes:j.bars.map(b=>b.c) }; }\n    }\n    // 2) user-supplied proxy returning {closes:[...]} (recommended for production — keeps keys server-side)\n    if (cfg.proxyUrl){\n      const r = await fetch(cfg.proxyUrl);\n      if (r.ok){ const j = await r.json(); if (j.closes && j.closes.length) return { src:(cfg.proxyName||'proxy'), closes:j.closes }; }\n    }\n    // 3) keyless best-effort so the artifact can go live out-of-the-box (Stooq daily CSV)\n    const r2 = await fetch('https://stooq.com/q/d/l/?s=spy.us&i=d');\n    if (r2.ok){\n      const txt = await r2.text();\n      const rows = txt.trim().split('\\n').slice(1);\n      const closes = rows.map(line => parseFloat(line.split(',')[4])).filter(v => !isNaN(v));\n      if (closes.length) return { src:'Stooq', closes:closes.slice(-15) };\n    }\n    return null;\n  }\n\n  // resample real closes to the chart's point count and normalize to % from window start\n  applyLiveSPX(closes){\n    Object.keys(this.charts).forEach((k)=>{\n      const C = this.charts[k];\n      const n = C.n;\n      const src = closes.slice(-n);\n      if (src.length < 2) return;\n      const base = src[0];\n      const idx = [];\n      for (let i = 0; i < n; i++){\n        const f = i/(n-1)*(src.length-1);\n        const lo = Math.floor(f), hi = Math.ceil(f), t = f-lo;\n        const v = src[lo]*(1-t) + src[hi]*t;\n        idx.push((v/base - 1)*100);\n      }\n      this.charts[k] = this.buildChart(C.dates, C.tony, C.bot, idx, C.label);\n    });\n    this.forceUpdate();\n  }\n\n  refreshTape(){ this.buildTape(); }\n\n  async updateMarks(){\n    try {\n      const cfg = (typeof window !== 'undefined' && window.TONY_FEED) || {};\n      if (!cfg.marksUrl && (!cfg.alpacaKey || !cfg.alpacaSecret)) return; // no keyless multi-symbol source — marks stay simulated\n      const syms = this.book.map((b)=>b.sym).join(',');\n      const url = cfg.marksUrl ? (cfg.marksUrl + '?syms=' + encodeURIComponent(syms)) : ('https://data.alpaca.markets/v2/stocks/trades/latest?symbols=' + syms + '&feed=iex');\n      const r = await fetch(url, cfg.marksUrl ? {} : { headers:{ 'APCA-API-KEY-ID':cfg.alpacaKey, 'APCA-API-SECRET-KEY':cfg.alpacaSecret } });\n      if (!r.ok) return;\n      const j = await r.json();\n      const tr = (j && j.trades) || {};\n      let any = false;\n      this.book.forEach((b)=>{\n        const px = tr[b.sym] && tr[b.sym].p;\n        if (px == null) return;\n        any = true;\n        const entry = parseFloat(String(b.entry).replace(/,/g,''));\n        const qty = parseFloat(String(b.qty).replace(/,/g,''));\n        const pl = Math.round((px - entry) * qty);\n        b.last = px.toFixed(2);\n        b.up = pl >= 0;\n        b.unreal = (pl >= 0 ? '+' : '−') + Math.abs(pl).toLocaleString();\n        const t = this.tickers[b.sym];\n        if (t){ t.last = b.last; t.unreal = b.unreal; t.unrealUp = b.up; t.unrealCol = b.up ? '#46d39a' : '#ff5d73'; this.enrich(t); }\n      });\n      if (any){ this.setState({ marksLive:true, marksTs:Date.now() }); this.forceUpdate(); }\n    } catch (e) { /* marks stay simulated, silent */ }\n  }\n\n  applyTweaks(){\n    const sp = this.props.tickerSpeed ?? 32;\n    if (this.runRef.current) this.runRef.current.style.animationDuration = sp + 's';\n    const show = this.props.showScanlines ?? true;\n    if (this.scanRef.current) this.scanRef.current.style.display = show ? 'block' : 'none';\n  }\n\n  buildTape(){\n    const run = this.runRef.current;\n    if (!run) return;\n    const tickers = this.tickers;\n    const T = [[\"AXON\",\"+4.97\",\"up\"],[\"DHR\",\"+5.75\",\"up\"],[\"GM\",\"+6.53\",\"up\"],[\"RF\",\"+2.94\",\"up\"],[\"APH\",\"-2.12\",\"dn\"],[\"NVDA\",\"-1.43\",\"dn\"],[\"CRWD\",\"-0.88\",\"dn\"],[\"MNDY\",\"-3.10\",\"dn\"],[\"SPY\",\"+0.21\",\"up\"],[\"QQQ\",\"+0.34\",\"up\"]];\n    const q = this.state.spxQuote;\n    let live = '';\n    if (q){\n      const col = q.up ? '#46d39a' : '#ff5d73';\n      const ar = q.up ? '▲' : '▼';\n      live = '<span style=\"display:inline-block;padding:0 22px;font-size:12px\"><span style=\"display:inline-block;width:6px;height:6px;border-radius:50%;background:#c4f042;box-shadow:0 0 8px #c4f042;margin-right:6px;vertical-align:1px\"><\u002Fspan><span style=\"font-weight:700;color:#c4f042\">SPY LIVE<\u002Fspan> <span style=\"color:#eaf2e9\">' + q.last + '<\u002Fspan> <span style=\"color:' + col + '\">' + ar + ' ' + q.chg + '<\u002Fspan><\u002Fspan>';\n    }\n    const one = live + T.map(function(row){\n      const s = row[0], d = row[1], c = row[2];\n      const col = c === 'up' ? '#46d39a' : '#ff5d73';\n      const ar = parseFloat(d) >= 0 ? '▲' : '▼';\n      const has = !!tickers[s];\n      const ds = has ? (' data-sym=\"' + s + '\"') : '';\n      const cur = has ? 'cursor:pointer;' : '';\n      return '<span' + ds + ' style=\"display:inline-block;padding:0 22px;font-size:12px;' + cur + '\"><span style=\"font-weight:700;color:#eaf2e9\">' + s + '<\u002Fspan> <span style=\"color:' + col + '\">' + ar + ' ' + d + '%<\u002Fspan><\u002Fspan>';\n    }).join('');\n    run.innerHTML = one + one;\n    if (!this._tapeBound){\n      const self = this;\n      run.addEventListener('click', function(e){\n        const el = e.target.closest('[data-sym]');\n        if (el) self.openTicker(el.dataset.sym);\n      });\n      this._tapeBound = true;\n    }\n  }\n\n  countUp(){\n    const root = this.rootRef.current;\n    if (!root) return;\n    root.querySelectorAll('[data-count]').forEach(function(el){\n      const tgt = parseFloat(el.dataset.count);\n      const dec = +(el.dataset.dec || 0);\n      const pre = el.dataset.prefix || '';\n      const suf = el.dataset.suffix || '';\n      const t0 = performance.now(), dur = 1400;\n      function f(t){\n        const k = Math.min(1, (t - t0) / dur);\n        const e = 1 - Math.pow(1 - k, 3);\n        const v = tgt * e;\n        el.textContent = pre + (dec ? v.toFixed(dec) : Math.round(v).toLocaleString()) + suf;\n        if (k < 1) requestAnimationFrame(f);\n      }\n      requestAnimationFrame(f);\n    });\n  }\n\n  growBars(){\n    const root = this.rootRef.current;\n    if (!root) return;\n    requestAnimationFrame(function(){\n      root.querySelectorAll('[data-w]').forEach(function(i){ i.style.width = i.dataset.w; });\n    });\n  }\n\n  openTicker(s){ if (this.tickers[s]) this.setState({ selected:s, sparkHover:null, sparkPin:null }); }\n\n  renderVals(){\n    const st = this.state;\n    const self = this;\n    const fmt = function(v){ return (v >= 0 ? '+' : '') + v.toFixed(1) + '%'; };\n\n    // chart overlay\n    const C = this.charts[st.range] || this.charts['2wk'];\n    const ci = st.pinIndex != null ? st.pinIndex : st.hoverIndex;\n    const hasActive = ci != null && ci < C.n;\n    let activeLeft = '0%', activeDots = [], tip = null;\n    if (hasActive){\n      activeLeft = C.coords.tony[ci].left;\n      activeDots = [\n        { left:C.coords.tony[ci].left, top:C.coords.tony[ci].top, color:'#ff9e2c' },\n        { left:C.coords.bot[ci].left, top:C.coords.bot[ci].top, color:'#37e0ff' },\n        { left:C.coords.index[ci].left, top:C.coords.index[ci].top, color:'#7e8a82' }\n      ];\n      const kf = function(d){ return '$'+Math.round(d/1000).toLocaleString()+'k'; };\n      tip = { date:C.dates[ci], when: ci===C.n-1?'14:21 ET':'close',\n        tonyV:kf(C.dollarOf(C.tony[ci])), tonyP:C.pctFmt(C.tony[ci]),\n        botV:kf(C.dollarOf(C.bot[ci])), botP:C.pctFmt(C.bot[ci]),\n        spxV:kf(C.dollarOf(C.index[ci])), spxP:C.pctFmt(C.index[ci]) };\n    }\n\n    // calls\n    const variant = st.callsVariant, filter = st.callsFilter;\n    const isChips = variant === 'chips', isSections = variant === 'sections', isFlat = variant === 'flat';\n    const toggle = function(active){ return { col: active ? '#c4f042' : '#7e8a82', bg: active ? 'rgba(196,240,66,.10)' : 'transparent' }; };\n    const isTimeline = variant === 'timeline';\n    const variants = [\n      { key:'timeline', label:'Timeline' }, { key:'flat', label:'Filter' }\n    ].map(function(v){ const s = toggle(v.key === variant); return { key:v.key, label:v.label, col:s.col, bg:s.bg }; });\n\n    const verbs = ['Adjust','Reaffirm','Override','Close'];\n    const counts = { all:this.calls.length };\n    verbs.forEach(function(vb){ counts[vb] = self.calls.filter(function(c){ return c.verb === vb; }).length; });\n    const chips = [{key:'all',label:'All'}].concat(verbs.map(function(vb){ return {key:vb,label:vb}; })).map(function(ch){\n      const active = ch.key === filter;\n      const color = ch.key === 'all' ? '#c4f042' : self.verbColor(ch.key);\n      return { key:ch.key, label:ch.label, count:counts[ch.key], col: active ? color : '#7d887f', bg: active ? 'rgba(255,255,255,.06)' : 'transparent' };\n    });\n\n    const gradeMeta = { win:{g:'✓',c:'#46d39a'}, loss:{g:'✗',c:'#ff5d73'}, open:{g:'•',c:'#7d887f'} };\n    const meta = function(c){ const gm = gradeMeta[c.grade] || gradeMeta.open; return Object.assign({}, c, { col:self.verbColor(c.verb), glyph:gm.g, gradeCol:gm.c }); };\n\n    let list = this.calls.slice();\n    if (filter !== 'all') list = list.filter(function(c){ return c.verb === filter; });\n    if (isFlat && st.timeFilter === 'today') list = list.filter(function(c){ return c.day === 'today'; });\n    const visibleCalls = list.map(meta);\n\n    const sections = verbs.map(function(vb){\n      const items = self.calls.filter(function(c){ return c.verb === vb; }).map(meta);\n      return { label:vb, col:self.verbColor(vb), count:items.length, items:items };\n    }).filter(function(s){ return s.count > 0; });\n\n    const buckets = [\n      { label:'Today', items:self.calls.filter(function(c){ return c.day === 'today'; }).map(meta) },\n      { label:'Earlier this week', items:self.calls.filter(function(c){ return c.day === 'week'; }).map(meta) }\n    ].filter(function(b){ return b.items.length > 0; }).map(function(b){ return { label:b.label, count:b.items.length, items:b.items }; });\n\n    const tToggle = toggle(st.timeFilter === 'today');\n    const wToggle = toggle(st.timeFilter === 'all');\n\n    const book = this.book.map(function(b){ return Object.assign({}, b, { col: b.up ? '#46d39a' : '#ff5d73' }); });\n\n    // drawer\n    const t = st.selected ? this.tickers[st.selected] : null;\n    const si = st.sparkPin != null ? st.sparkPin : st.sparkHover;\n    const sparkActive = !!(t && si != null);\n    let sparkLeft='0%', sparkDot=null, sparkTip=null;\n    if (sparkActive){\n      sparkLeft = t.sparkCoords[si].left;\n      sparkDot = { left:t.sparkCoords[si].left, top:t.sparkCoords[si].top, color:t.sparkColor };\n      sparkTip = { date:this.sparkDates[si], when: si===t.sparkN-1?'14:21 ET':'close', price:'$'+t.vals[si].toFixed(2) };\n    }\n\n    return {\n      rootRef:this.rootRef, runRef:this.runRef, scanRef:this.scanRef, clockRef:this.clockRef, feedRef:this.feedRef,\n      // tabs / views\n      viewOverview: st.view === 'overview', viewPositions: st.view === 'positions', viewCalls: st.view === 'calls',\n      tabs: [{key:'overview',label:'Overview'},{key:'calls',label:'Calls'},{key:'positions',label:'Positions'}].map(function(tb){ const on = tb.key === st.view; return { key:tb.key, label:tb.label, col: on ? '#eaf2e9' : '#7d887f', bar: on ? '#c4f042' : 'transparent' }; }),\n      onTabClick:(e)=>this.setState({view:e.currentTarget.dataset.view}),\n      positions: this.book.map((b)=>{ const t = this.tickers[b.sym] || { name:b.sym, stop:'', target:'', rmult:'', rCol:'#7e8a82', tony:{verb:''}, verbCol:'#7e8a82', day:'', dayCol:'#7e8a82', sparkPts:'', sparkArea:'', sparkColor:'#37e0ff', targetGap:'', targetGapCol:'#7e8a82', horizon:'—' }; return {\n        sym:b.sym, name:t.name, qty:b.qty, entry:b.entry, last:b.last, stop:t.stop, target:t.target,\n        unreal:b.unreal, unrealCol: b.up ? '#46d39a' : '#ff5d73', rmult:t.rmult, rCol:t.rCol,\n        verb:t.tony.verb, verbCol:t.verbCol, day:t.day, dayCol:t.dayCol,\n        sparkPts:t.sparkPts, sparkArea:t.sparkArea, sparkColor:t.sparkColor,\n        targetGap:t.targetGap, targetGapCol:t.targetGapCol, horizon:t.horizon }; }),\n      closed: this.closed.map((c)=>Object.assign({}, c, { plCol: c.up ? '#46d39a' : '#ff5d73', sideCol: this.verbColor(c.side) })),\n      realizedSum:this.realizedSum,\n      marksLive: !!st.marksLive,\n      marksLabel: st.marksLive ? '● marks live' : '○ marks simulated',\n      marksCol: st.marksLive ? '#46d39a' : '#7d887f',\n      // chart\n      chartTonyPts:C.tonyPts, chartBotPts:C.botPts, chartIndexPts:C.indexPts, chartArea:C.area,\n      yTicks:C.yTicks, xTicks:C.xTicks, rangeLabel:C.label, tonyEnd:C.tonyEnd, botEnd:C.botEnd, spxEnd:C.spxEnd,\n      spxLive:st.spxLive, spxDash: st.spxLive ? '0' : '5 4', spxOpacity: st.spxLive ? 0.78 : 0.4,\n      spxLegendCol: st.spxLive ? '#929e95' : '#7d887f', spxLegendText: st.spxLive ? C.spxEnd : '· awaiting live feed (sim)',\n      ddShow:C.ddShow, ddLeft:C.ddLeft, ddWidth:C.ddWidth, ddPct:C.ddPct, ddPeakPt:C.ddPeakPt, ddTroughPt:C.ddTroughPt, ddMidLeft:C.ddMidLeft, ddDropH:C.ddDropH, pending:this.pending,\n      attrib:this.attrib.map((a)=>Object.assign({},a,{col:a.up?'#46d39a':'#ff5d73',w:(Math.abs(parseFloat(String(a.pl).replace(/[+−-]/g,'')))/this.attribMax*100)+'%'})), sectors:this.sectors,\n      rangeDefs:[{key:'2wk',label:'2W'},{key:'1mo',label:'1M'},{key:'inception',label:'ALL'}].map(function(r){ const s=toggle(r.key===st.range); return {key:r.key,label:r.label,col:s.col,bg:s.bg}; }),\n      onRangeClick:(e)=>this.setState({range:e.currentTarget.dataset.range, hoverIndex:null, pinIndex:null}),\n      hasActive:hasActive, activeLeft:activeLeft, activeDots:activeDots, tip:tip, pinned: st.pinIndex != null,\n      onChartMove:(e)=>{ const C2=this.charts[this.state.range]; const r=e.currentTarget.getBoundingClientRect(); const ratio=(e.clientX-r.left)/r.width; let i=Math.round(ratio*(C2.n-1)); i=Math.max(0,Math.min(C2.n-1,i)); if(i!==this.state.hoverIndex) this.setState({hoverIndex:i}); },\n      onChartLeave:()=>{ if(this.state.hoverIndex!=null) this.setState({hoverIndex:null}); },\n      onChartClick:(e)=>{ const C2=this.charts[this.state.range]; const r=e.currentTarget.getBoundingClientRect(); const ratio=(e.clientX-r.left)/r.width; let i=Math.round(ratio*(C2.n-1)); i=Math.max(0,Math.min(C2.n-1,i)); this.setState({pinIndex: this.state.pinIndex===i?null:i}); },\n      // calls\n      callsFilter:filter, isChips:isChips, isSections:isSections, isFlat:isFlat, isTimeline:isTimeline, showFlatList:(isChips||isFlat),\n      variants:variants, chips:chips, visibleCalls:visibleCalls, sections:sections, buckets:buckets,\n      todayCol:tToggle.col, todayBg:tToggle.bg, weekCol:wToggle.col, weekBg:wToggle.bg,\n      onVariantClick:(e)=>this.setState({callsVariant:e.currentTarget.dataset.variant}),\n      onChipClick:(e)=>this.setState({callsFilter:e.currentTarget.dataset.key}),\n      onVerbChange:(e)=>this.setState({callsFilter:e.target.value}),\n      onTimeClick:(e)=>this.setState({timeFilter:e.currentTarget.dataset.time}),\n      onRowClick:(e)=>this.openTicker(e.currentTarget.dataset.sym),\n      // book\n      book:book,\n      // drawer\n      drawerOpen: !!t, t:t,\n      confPct: t ? (t.tony.confidence + '%') : '0%',\n      sparkActive:sparkActive, sparkLeft:sparkLeft, sparkDot:sparkDot, sparkTip:sparkTip,\n      onSparkMove:(e)=>{ if(!this.state.selected) return; const r=e.currentTarget.getBoundingClientRect(); const frac=((e.clientX-r.left) - r.width*4/240)/(r.width*184/240); const tk=this.tickers[this.state.selected]; let i=Math.round(frac*(tk.sparkN-1)); i=Math.max(0,Math.min(tk.sparkN-1,i)); if(i!==this.state.sparkHover) this.setState({sparkHover:i}); },\n      onSparkLeave:()=>{ if(this.state.sparkHover!=null) this.setState({sparkHover:null}); },\n      onSparkClick:(e)=>{ if(!this.state.selected) return; const r=e.currentTarget.getBoundingClientRect(); const frac=((e.clientX-r.left) - r.width*4/240)/(r.width*184/240); const tk=this.tickers[this.state.selected]; let i=Math.round(frac*(tk.sparkN-1)); i=Math.max(0,Math.min(tk.sparkN-1,i)); this.setState({sparkPin: this.state.sparkPin===i?null:i}); },\n      onCloseDrawer:()=>this.setState({selected:null})\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
